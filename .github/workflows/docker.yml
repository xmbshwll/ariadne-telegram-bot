name: Docker

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: .
          load: true
          tags: ariadne-telegram-bot:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Verify image loaded
        run: docker image inspect ariadne-telegram-bot:ci >/dev/null
